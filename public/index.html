<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sphere.io</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07090d;--surface:#0d1018;--surface2:#131720;--border:#1a2235;
  --text:#c8dff5;--dim:#3a5470;--accent:#00c8f0;--danger:#ff4455;
  --heal:#3dffaa;--mp:#8866ff;--gold:#ffc844;--sys:#ff9944;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ══ AUTH SCREEN ══ */
#auth-screen{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 50%,#0a1628,#07090d);
}
.auth-card{
  width:min(420px,92vw);
  background:var(--surface);
  border:1px solid var(--border);
  padding:44px 36px;
  clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));
  display:flex;flex-direction:column;gap:24px;
}
.auth-logo{text-align:center;}
.auth-logo svg{animation:spin 12s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.logo-title{font-family:'Rajdhani',sans-serif;font-size:40px;font-weight:700;letter-spacing:6px;color:#fff;text-shadow:0 0 24px var(--accent);}
.logo-title span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.auth-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.auth-tab{flex:1;padding:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:transparent;border:none;color:var(--dim);cursor:pointer;transition:all 0.2s;}
.auth-tab.active{background:var(--accent);color:#000;}
.auth-input{
  background:var(--surface2);border:1px solid var(--border);border-radius:2px;
  padding:13px 16px;font-size:14px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;
}
.auth-input:focus{border-color:var(--accent);}
.auth-input::placeholder{color:var(--dim);}
.auth-btn{
  background:transparent;border:1.5px solid var(--accent);color:var(--accent);
  border-radius:2px;padding:13px;font-size:14px;font-weight:600;
  font-family:'Rajdhani',sans-serif;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
}
.auth-btn:hover{background:var(--accent);color:#000;}
.auth-error{font-size:12px;color:var(--danger);text-align:center;min-height:16px;}

/* ══ GAME SCREEN ══ */
#game-screen{display:none;flex:1;flex-direction:column;overflow:hidden;}

/* 헤더 HUD */
#hud{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;
  height:52px;
}
.hud-logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:4px;color:var(--accent);}
.hud-shape{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hud-info{display:flex;flex-direction:column;gap:1px;}
.hud-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;line-height:1;}
.hud-class{font-size:10px;color:var(--dim);}
.hud-bars{display:flex;flex-direction:column;gap:3px;min-width:130px;}
.hud-bar{display:flex;align-items:center;gap:5px;font-size:10px;}
.hud-bar-label{width:16px;color:var(--dim);}
.hud-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;}
.hud-fill{height:100%;border-radius:1px;transition:width 0.3s;}
.hp-fill{background:linear-gradient(90deg,#ff4455,#ff7788);}
.mp-fill{background:linear-gradient(90deg,#6644ff,#8866ff);}
.hud-val{font-size:9px;color:var(--dim);min-width:44px;}
.hud-stats{display:flex;gap:8px;}
.hud-stat{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--dim);}
.hud-stat span{color:var(--text);}
.hud-gold{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--gold);margin-left:auto;}

/* 메인 레이아웃 */
#main{flex:1;display:flex;overflow:hidden;}

/* 맵 영역 */
#map-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:crosshair;}
#map-canvas{display:block;}

/* ══ 채팅 UI (왼쪽 상단 고정) ══ */
#chat-panel{
  position:absolute;
  top:12px;left:12px;
  width:280px;
  z-index:50;
  display:flex;flex-direction:column;
  background:rgba(7,9,13,0.82);
  border:1px solid var(--border);
  border-radius:3px;
  backdrop-filter:blur(6px);
  pointer-events:auto;
  max-height:320px;
}
#chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#chat-header-title{
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent);
}
#chat-online{font-size:10px;color:var(--dim);}
#messages{
  flex:1;overflow-y:auto;
  padding:8px 10px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
  min-height:140px;
  max-height:200px;
}
#messages::-webkit-scrollbar{width:2px;}
#messages::-webkit-scrollbar-thumb{background:var(--border);}
.chat-msg{font-size:12px;line-height:1.5;word-break:break-all;}
.chat-nick{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;}
.chat-sys{font-size:11px;color:var(--sys);padding:2px 5px;background:rgba(255,153,68,0.05);border-radius:2px;}
#chat-input-wrap{
  border-top:1px solid var(--border);padding:7px 8px;
  display:flex;gap:6px;flex-shrink:0;
}
#chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:2px;
  padding:6px 9px;font-size:12px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;outline:none;
}
#chat-input:focus{border-color:var(--accent);}
#chat-send{
  background:transparent;border:1px solid var(--accent);color:var(--accent);
  border-radius:2px;width:28px;height:28px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;
}
#chat-send:hover{background:var(--accent);color:#000;}

/* 전투 타겟 표시 (화면 하단 중앙) */
#combat-info{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:none;
  background:rgba(13,16,24,0.90);border:1px solid var(--border);
  padding:8px 18px;border-radius:2px;
  flex-direction:column;align-items:center;gap:5px;
  min-width:180px;pointer-events:none;
}
.ci-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;}
.ci-hpbar{width:160px;height:6px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden;}
.ci-hpfill{height:100%;background:linear-gradient(90deg,#ff4455,#ff6644);transition:width 0.3s;}
.ci-hptext{font-size:10px;color:var(--dim);}

/* 스킬 힌트 바 */
#skill-bar{
  position:absolute;bottom:16px;right:16px;
  display:flex;flex-direction:column;gap:6px;
  pointer-events:none;
}
.skill-hint{
  font-family:'Rajdhani',sans-serif;font-size:11px;
  color:var(--dim);letter-spacing:1px;text-align:right;
}
.skill-key{
  display:inline-block;
  background:var(--surface2);border:1px solid var(--border);
  padding:1px 5px;border-radius:2px;font-size:10px;color:var(--accent);
  margin-right:4px;
}

/* 직업 선택 모달 */
#class-modal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
#class-modal.show{display:flex;}
.class-modal-card{
  background:var(--surface);border:1px solid var(--border);
  padding:36px 32px;width:min(480px,92vw);
  display:flex;flex-direction:column;gap:20px;
  clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));
}
.cm-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.cm-sub{font-size:12px;color:var(--dim);}
.cm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.cm-card{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:2px;
  padding:14px 10px;cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;
}
.cm-card:hover{transform:translateY(-2px);}
.cm-shape{width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
.cm-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;}
.cm-cond{font-size:10px;color:var(--dim);line-height:1.4;}
.cm-close{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:2px;padding:8px;font-size:12px;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.cm-close:hover{border-color:var(--danger);color:var(--danger);}

/* 데미지 팝업 */
.dmg-float{
  position:fixed;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;
  pointer-events:none;z-index:400;
  animation:dfloat 1s ease-out forwards;
}
@keyframes dfloat{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-50px) scale(1.2);}}

/* 레벨업 */
#levelup-pop{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:var(--surface);border:2px solid var(--gold);
  padding:28px 48px;text-align:center;z-index:500;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 0 60px rgba(255,200,68,0.3);
}
#levelup-pop.show{display:block;transform:translate(-50%,-50%) scale(1);}
.lup-t{font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:4px;color:var(--gold);}
.lup-n{font-family:'Rajdhani',sans-serif;font-size:60px;font-weight:700;color:#fff;line-height:1;}
.lup-evo{font-size:13px;color:var(--accent);margin-top:6px;}

/* 미니맵 */
#minimap{
  position:absolute;bottom:16px;right:130px;
  width:120px;height:90px;
  background:rgba(13,16,24,0.85);
  border:1px solid var(--border);
  border-radius:2px;overflow:hidden;
}
#minimap-canvas{display:block;}

/* 사망 오버레이 */
#death-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(255,68,85,0.07);
  pointer-events:none;z-index:10;
  border:2px solid rgba(255,68,85,0.3);
}
#death-overlay.show{display:block;}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <polygon points="32,4 60,52 4,52" fill="none" stroke="#00c8f0" stroke-width="1.5" opacity="0.7"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="#8866ff" stroke-width="1.5" opacity="0.6"/>
        <rect x="16" y="16" width="32" height="32" fill="none" stroke="#ff4455" stroke-width="1" opacity="0.35" transform="rotate(20 32 32)"/>
      </svg>
      <div class="logo-title">SPHERE<span>.</span>IO</div>
      <div class="logo-sub">Geometric Open World RPG</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchTab('register')">회원가입</button>
    </div>
    <input class="auth-input" id="auth-nick" type="text" placeholder="닉네임" maxlength="12" autocomplete="off"/>
    <input class="auth-input" id="auth-pw" type="password" placeholder="비밀번호" maxlength="32"/>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-btn" onclick="doAuth()">로그인</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-logo">S<span style="color:var(--dim)">·</span>IO</div>
    <div class="hud-shape" id="hud-shape"></div>
    <div class="hud-info">
      <div class="hud-name" id="hud-name">-</div>
      <div class="hud-class" id="hud-class">-</div>
    </div>
    <div class="hud-bars">
      <div class="hud-bar">
        <div class="hud-bar-label" style="color:#ff7788">HP</div>
        <div class="hud-track"><div class="hud-fill hp-fill" id="hud-hp-bar" style="width:100%"></div></div>
        <div class="hud-val" id="hud-hp-val">-</div>
      </div>
      <div class="hud-bar">
        <div class="hud-bar-label" style="color:#8866ff">MP</div>
        <div class="hud-track"><div class="hud-fill mp-fill" id="hud-mp-bar" style="width:100%"></div></div>
        <div class="hud-val" id="hud-mp-val">-</div>
      </div>
    </div>
    <div class="hud-stats">
      <div class="hud-stat">ATK <span id="hud-atk">-</span></div>
      <div class="hud-stat">DEF <span id="hud-def">-</span></div>
      <div class="hud-stat">킬 <span id="hud-kills">-</span></div>
      <div class="hud-stat">EXP <span id="hud-exp">-</span></div>
    </div>
    <div class="hud-gold" id="hud-gold">0 G</div>
  </div>

  <div id="main">
    <!-- 맵 -->
    <div id="map-wrap">
      <canvas id="map-canvas"></canvas>

      <!-- 채팅 패널 (왼쪽 상단 고정) -->
      <div id="chat-panel">
        <div id="chat-header">
          <span id="chat-header-title">CHAT</span>
          <span id="chat-online">● 0 online</span>
        </div>
        <div id="messages"></div>
        <div id="chat-input-wrap">
          <input id="chat-input" type="text" placeholder="메시지 입력..." maxlength="80"/>
          <button id="chat-send" onclick="sendChat()">↑</button>
        </div>
      </div>

      <!-- 전투 타겟 정보 -->
      <div id="combat-info">
        <div class="ci-name" id="ci-name">-</div>
        <div class="ci-hpbar"><div class="ci-hpfill" id="ci-hpfill" style="width:100%"></div></div>
        <div class="ci-hptext" id="ci-hptext">-</div>
      </div>

      <!-- 스킬 힌트 -->
      <div id="skill-bar">
        <div class="skill-hint"><span class="skill-key">클릭</span> 몬스터 공격</div>
        <div class="skill-hint"><span class="skill-key">F</span> 스킬 (타겟 선택 후)</div>
        <div class="skill-hint"><span class="skill-key">H</span> 힐 (HP회복)</div>
        <div class="skill-hint"><span class="skill-key">WASD</span> 이동</div>
      </div>

      <!-- 미니맵 -->
      <div id="minimap"><canvas id="minimap-canvas" width="120" height="90"></canvas></div>

      <!-- 사망 오버레이 -->
      <div id="death-overlay"></div>
    </div>
  </div>
</div>

<!-- 직업 선택 모달 -->
<div id="class-modal">
  <div class="class-modal-card">
    <div class="cm-title">직업 각성</div>
    <div class="cm-sub">조건을 달성했습니다! 직업을 선택하세요. 한번 선택하면 변경할 수 없습니다.</div>
    <div class="cm-grid" id="cm-grid"></div>
    <button class="cm-close" onclick="closeClassModal()">나중에 선택</button>
  </div>
</div>

<!-- 레벨업 팝업 -->
<div id="levelup-pop">
  <div class="lup-t">LEVEL UP</div>
  <div class="lup-n" id="lup-n">2</div>
  <div class="lup-evo" id="lup-evo"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// ══════════════════════════════════════
//  상태 변수
// ══════════════════════════════════════
let me = null;
let authMode = 'login';
let allPlayers  = {};
let allMonsters = {};
let monsterAI   = {};
let nearestMonster = null;  // 범위 내 자동 선택
let targetMonster  = null;  // 클릭 수동 선택

let camX = 0, camY = 0;
let keysDown = {};

const SPEED             = 3;
const MAP_W             = 2000, MAP_H = 1500;
const TOWN_X            = 250,  TOWN_Y = 750;
const DUNGEON_X         = 1780, DUNGEON_Y = 750, DUNGEON_R = 70;
const ATTACK_RANGE      = 130;
const AUTO_SELECT_RANGE = 160;
const SKILL_COOLDOWN    = 2000;
const ATTACK_COOLDOWN   = 500;
const CULL_MARGIN       = 80;

const CLI_DETECT_RANGE  = 200;
const CLI_CHASE_SPEED   = 1.5;
const CLI_WANDER_SPEED  = 0.25;
const CLI_WANDER_RANGE  = 130;
const CLI_CONTACT_RANGE = 22;

let lastSkillTime  = 0;
let lastAttackTime = 0;
let onlineCount    = 0;

// ══════════════════════════════════════
//  캔버스
// ══════════════════════════════════════
const canvas   = document.getElementById('map-canvas');
const ctx      = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════
//  인증
// ══════════════════════════════════════
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) =>
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='register'))
  );
  document.getElementById('auth-btn').textContent = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('auth-error').textContent = '';
}
function doAuth() {
  const nickname = document.getElementById('auth-nick').value.trim();
  const password = document.getElementById('auth-pw').value;
  if (!nickname || !password) { showAuthErr('닉네임과 비밀번호를 입력하세요.'); return; }
  socket.emit(authMode === 'login' ? 'login' : 'register', { nickname, password });
}
document.getElementById('auth-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
document.getElementById('auth-nick').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-pw').focus(); });
function showAuthErr(msg) { document.getElementById('auth-error').textContent = msg; }

socket.on('auth error', msg => showAuthErr(msg));

socket.on('login success', data => {
  me = Object.assign({}, data, { x: TOWN_X, y: TOWN_Y }); // 위치 항상 타운
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  resizeCanvas();
  updateHUD();
  camX = me.x - canvas.width  / 2;
  camY = me.y - canvas.height / 2;
  requestAnimationFrame(gameLoop);
});

// ══════════════════════════════════════
//  도형 그리기
// ══════════════════════════════════════
function drawShape(ctx, shape, x, y, size, color, alpha, filled) {
  alpha  = alpha  !== undefined ? alpha  : 1;
  filled = filled !== undefined ? filled : false;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.fillStyle   = color + '28';
  ctx.lineWidth   = 2;
  ctx.shadowColor = color;
  ctx.shadowBlur  = filled ? 8 : 12;
  ctx.beginPath();
  switch (shape) {
    case 'circle':
      ctx.arc(x, y, size / 2, 0, Math.PI * 2);
      break;
    case 'triangle': {
      var h = size * 0.866;
      ctx.moveTo(x, y - size * 0.577);
      ctx.lineTo(x + size / 2, y + h * 0.423);
      ctx.lineTo(x - size / 2, y + h * 0.423);
      ctx.closePath();
      break;
    }
    case 'square': {
      var s2 = size / 2;
      ctx.rect(x - s2, y - s2, size, size);
      break;
    }
    case 'pentagon': drawPoly(ctx, x, y, size / 2, 5, -90);   break;
    case 'hexagon':  drawPoly(ctx, x, y, size / 2, 6, 0);     break;
    case 'star':     drawStar(ctx, x, y, size / 2, size / 4, 5); break;
    default:         ctx.arc(x, y, size / 2, 0, Math.PI * 2);
  }
  if (filled) ctx.fill();
  ctx.stroke();
  ctx.restore();
}
function drawPoly(ctx, cx, cy, r, sides, startAngle) {
  for (var i = 0; i <= sides; i++) {
    var a = (i * 360 / sides + startAngle) * Math.PI / 180;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    else         ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}
function drawStar(ctx, cx, cy, outerR, innerR, points) {
  for (var i = 0; i <= points * 2; i++) {
    var r = i % 2 === 0 ? outerR : innerR;
    var a = (i * 180 / points - 90) * Math.PI / 180;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    else         ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}

// ══════════════════════════════════════
//  몬스터 클라이언트 AI
// ══════════════════════════════════════
function initMonsterAI(m) {
  if (monsterAI[m.uid]) return;
  monsterAI[m.uid] = {
    state:       'wander',
    wanderPhase: 'idle',
    spawnX:      m.x, spawnY: m.y,
    tx: m.x, ty: m.y,
    wanderTimer: 500 + Math.random() * 1500,
    aggroTimer:  0,
  };
}

function updateMonsterAI(dt) {
  if (!me || me.hp <= 0) return;
  var monsters = Object.values(allMonsters);
  for (var i = 0; i < monsters.length; i++) {
    var m = monsters[i];
    if (!m.alive) continue;
    initMonsterAI(m);
    var ai = monsterAI[m.uid];
    var distToPlayer = Math.hypot(me.x - m.x, me.y - m.y);

    // 상태 전환
    if (distToPlayer < CLI_DETECT_RANGE) {
      ai.state = 'chase';
      ai.aggroTimer = 3000;
    } else {
      ai.aggroTimer -= dt;
      if (ai.aggroTimer <= 0) ai.state = 'wander';
    }

    if (ai.state === 'chase') {
      var dx = me.x - m.x, dy = me.y - m.y;
      var dist = Math.hypot(dx, dy);
      if (dist > CLI_CONTACT_RANGE && dist > 0) {
        var spd = CLI_CHASE_SPEED * (dt / 16);
        m.x += (dx / dist) * spd;
        m.y += (dy / dist) * spd;
      }
    } else {
      // 배회: idle -> (목적지 설정) -> move -> 도착 -> idle
      ai.wanderTimer -= dt;
      if (ai.wanderPhase === 'idle') {
        if (ai.wanderTimer <= 0) {
          var angle = Math.random() * Math.PI * 2;
          var r = 40 + Math.random() * CLI_WANDER_RANGE;
          ai.tx = Math.max(50, Math.min(MAP_W - 50, ai.spawnX + Math.cos(angle) * r));
          ai.ty = Math.max(50, Math.min(MAP_H - 50, ai.spawnY + Math.sin(angle) * r));
          ai.wanderPhase = 'move';
          ai.wanderTimer = 0;
        }
      } else {
        var wdx = ai.tx - m.x, wdy = ai.ty - m.y;
        var wdist = Math.hypot(wdx, wdy);
        if (wdist > 3) {
          var wspd = CLI_WANDER_SPEED * (dt / 16);
          var move = Math.min(wspd, wdist); // 목적지 오버슛 방지
          m.x += (wdx / wdist) * move;
          m.y += (wdy / wdist) * move;
        } else {
          m.x = ai.tx; m.y = ai.ty;
          ai.wanderPhase = 'idle';
          ai.wanderTimer = 800 + Math.random() * 600;
        }
      }
    }
  }
}

// ══════════════════════════════════════
//  타겟 선택 + 전투 UI
// ══════════════════════════════════════
function updateTargetSelection() {
  if (!me) return;

  // 유효하지 않은 타겟 정리
  if (targetMonster  && !allMonsters[targetMonster.uid])  targetMonster  = null;
  if (nearestMonster && !allMonsters[nearestMonster.uid]) nearestMonster = null;

  // 범위 내 가장 가까운 몹 자동 선택
  var closest = null, closestDist = AUTO_SELECT_RANGE;
  var mArr = Object.values(allMonsters);
  for (var i = 0; i < mArr.length; i++) {
    var m = mArr[i];
    if (!m.alive) continue;
    var d = Math.hypot(me.x - m.x, me.y - m.y);
    if (d < closestDist) { closestDist = d; closest = m; }
  }
  nearestMonster = closest;

  // 표시 타겟: 수동 선택 우선, 없으면 자동
  var disp = targetMonster || nearestMonster;
  var ci = document.getElementById('combat-info');
  if (disp && allMonsters[disp.uid]) {
    var dm = allMonsters[disp.uid];
    ci.style.display = 'flex';
    document.getElementById('ci-name').textContent    = dm.name;
    var hpPct = dm.maxHp > 0 ? (dm.hp / dm.maxHp * 100) : 0;
    document.getElementById('ci-hpfill').style.width  = hpPct + '%';
    document.getElementById('ci-hptext').textContent  = dm.hp + ' / ' + dm.maxHp;
    var dmAI = monsterAI[dm.uid];
    document.getElementById('ci-name').style.color =
      (dmAI && dmAI.state === 'chase') ? 'var(--danger)' : 'var(--text)';
  } else {
    ci.style.display = 'none';
  }
}

function getAttackTarget() {
  if (targetMonster  && allMonsters[targetMonster.uid])  return targetMonster;
  if (nearestMonster && allMonsters[nearestMonster.uid]) return nearestMonster;
  return null;
}

// ══════════════════════════════════════
//  캔버스 클릭
// ══════════════════════════════════════
canvas.addEventListener('click', function(e) {
  if (!me || me.hp <= 0) return;
  var rect = canvas.getBoundingClientRect();
  var wx = e.clientX - rect.left + camX;
  var wy = e.clientY - rect.top  + camY;

  var clicked = null, clickDist = Infinity;
  var mArr = Object.values(allMonsters);
  for (var i = 0; i < mArr.length; i++) {
    var m = mArr[i];
    if (!m.alive) continue;
    var d = Math.hypot(wx - m.x, wy - m.y);
    if (d < 26 && d < clickDist) { clicked = m; clickDist = d; }
  }

  if (!clicked) {
    targetMonster = null;
    return;
  }

  targetMonster = clicked;

  var distToMob = Math.hypot(me.x - clicked.x, me.y - clicked.y);
  if (distToMob > ATTACK_RANGE) {
    addSysMsg('[공격] 몬스터에게 더 가까이 가세요!');
    return;
  }

  var now = Date.now();
  if (now - lastAttackTime < ATTACK_COOLDOWN) return;
  lastAttackTime = now;
  socket.emit('attack monster', { uid: clicked.uid, action: 'attack' });
});

// ══════════════════════════════════════
//  게임 루프
// ══════════════════════════════════════
var lastTime = 0;
function gameLoop(ts) {
  if (!me) return;
  var dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  handleMovement(dt);
  updateMonsterAI(dt);
  updateTargetSelection();
  render();
  renderMinimap();
  requestAnimationFrame(gameLoop);
}

function handleMovement(dt) {
  if (!me || me.hp <= 0) return;
  var dx = 0, dy = 0;
  if (keysDown['ArrowLeft']  || keysDown['a'] || keysDown['A']) dx -= SPEED;
  if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) dx += SPEED;
  if (keysDown['ArrowUp']    || keysDown['w'] || keysDown['W']) dy -= SPEED;
  if (keysDown['ArrowDown']  || keysDown['s'] || keysDown['S']) dy += SPEED;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  if (dx !== 0 || dy !== 0) {
    me.x = Math.max(20, Math.min(MAP_W - 20, me.x + dx));
    me.y = Math.max(20, Math.min(MAP_H - 20, me.y + dy));
    socket.emit('move', { x: me.x, y: me.y });
    if (Math.hypot(me.x - DUNGEON_X, me.y - DUNGEON_Y) < DUNGEON_R + 10)
      addSysMsg('[던전 입구] 던전 시스템은 다음 업데이트 예정입니다!');
  }
  camX += (me.x - canvas.width  / 2 - camX) * 0.1;
  camY += (me.y - canvas.height / 2 - camY) * 0.1;
}

// ══════════════════════════════════════
//  렌더링
// ══════════════════════════════════════
function isInViewport(wx, wy, margin) {
  var sx = wx - camX, sy = wy - camY;
  return sx > -margin && sx < canvas.width  + margin &&
         sy > -margin && sy < canvas.height + margin;
}

function render() {
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 배경
  ctx.fillStyle = '#07090d';
  ctx.fillRect(0, 0, W, H);

  // 그리드
  ctx.strokeStyle = 'rgba(26,34,53,0.6)';
  ctx.lineWidth = 1;
  var gs = 80;
  var ox = (-camX) % gs, oy = (-camY) % gs;
  for (var gx = ox; gx < W; gx += gs) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (var gy = oy; gy < H; gy += gs) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

  // 맵 경계
  ctx.strokeStyle = '#1a2235'; ctx.lineWidth = 2;
  ctx.strokeRect(-camX, -camY, MAP_W, MAP_H);

  // 마을
  var twx = TOWN_X - camX, twy = TOWN_Y - camY;
  ctx.save(); ctx.globalAlpha = 0.07; ctx.fillStyle = '#4ecdc4';
  ctx.beginPath(); ctx.arc(twx, twy, 200, 0, Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 1; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.arc(twx, twy, 200, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.fillStyle = 'rgba(78,205,196,0.5)';
  ctx.font = '11px Rajdhani, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('TOWN', twx, twy - 210);

  // 던전
  var dungX = DUNGEON_X - camX, dungY = DUNGEON_Y - camY;
  ctx.save(); ctx.globalAlpha = 0.1; ctx.fillStyle = '#ff4455';
  ctx.beginPath(); ctx.arc(dungX, dungY, DUNGEON_R, 0, Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save();
  ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 500) * 0.2;
  ctx.strokeStyle = '#ff4455'; ctx.lineWidth = 2; ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.arc(dungX, dungY, DUNGEON_R, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.fillStyle = 'rgba(255,68,85,0.7)';
  ctx.font = 'bold 12px Rajdhani, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('DUNGEON', dungX, dungY - DUNGEON_R - 8);
  drawShape(ctx, 'hexagon', dungX, dungY, 36, '#ff4455', 0.6);

  // 현재 표시 타겟
  var dispTarget = targetMonster || nearestMonster;

  // 몬스터 렌더링
  var mArr = Object.values(allMonsters);
  for (var mi = 0; mi < mArr.length; mi++) {
    var m = mArr[mi];
    if (!isInViewport(m.x, m.y, CULL_MARGIN)) continue;
    var mx = m.x - camX, my = m.y - camY;
    var ai = monsterAI[m.uid];
    var isChasing  = ai && ai.state === 'chase';
    var isSelected = dispTarget && dispTarget.uid === m.uid;

    if (isChasing) {
      ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = '#ff4455';
      ctx.beginPath(); ctx.arc(mx, my, 32, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    if (isSelected) {
      ctx.save();
      ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 250) * 0.1;
      ctx.strokeStyle = isChasing ? '#ff4455' : '#00c8f0';
      ctx.lineWidth = 2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(mx, my, 22, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    var mColor = isChasing ? '#ff6644' : m.color;
    var mSize  = isChasing ? 28 : 24;
    var mAlpha = isChasing ? 1 : 0.85;
    drawShape(ctx, m.shape, mx, my, mSize, mColor, mAlpha);

    // HP바
    var bw = 34, bh = 4, bx = mx - bw/2, by = my - 22;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
    var hpR = m.maxHp > 0 ? m.hp / m.maxHp : 0;
    ctx.fillStyle = hpR > 0.5 ? m.color : (hpR > 0.25 ? '#ffd93d' : '#ff4455');
    ctx.fillRect(bx, by, bw * hpR, bh);

    ctx.fillStyle = isChasing ? 'rgba(255,136,119,0.7)' : m.color + 'aa';
    ctx.font = '10px Noto Sans KR, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(isChasing ? '\u2694 ' + m.name : m.name, mx, my + 22);
  }

  // 다른 플레이어
  var pArr = Object.entries(allPlayers);
  for (var pi = 0; pi < pArr.length; pi++) {
    var pid = pArr[pi][0], p = pArr[pi][1];
    if (pid === socket.id || !isInViewport(p.x, p.y, CULL_MARGIN)) continue;
    var ppx = p.x - camX, ppy = p.y - camY;
    drawShape(ctx, p.shape, ppx, ppy, 24, p.color, 0.9, true);
    ctx.fillStyle = p.color + 'cc'; ctx.font = '11px Rajdhani, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(p.nickname, ppx, ppy - 18);
    ctx.fillStyle = p.color + '55'; ctx.font = '10px sans-serif';
    ctx.fillText('Lv.' + p.level, ppx, ppy + 22);
  }

  // 내 캐릭터
  if (me) {
    var mpx = me.x - camX, mpy = me.y - camY;
    drawShape(ctx, me.shape, mpx, mpy, 28, me.color, 1, true);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Rajdhani, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(me.nickname, mpx, mpy - 20);
    if (me.hp <= 0) {
      ctx.save(); ctx.globalAlpha = 0.6; ctx.fillStyle = '#ff4455';
      ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('X', mpx, mpy + 6); ctx.restore();
    }
  }
}

function renderMinimap() {
  var mw = 120, mh = 90;
  mmCtx.clearRect(0, 0, mw, mh);
  mmCtx.fillStyle = 'rgba(7,9,13,0.9)'; mmCtx.fillRect(0, 0, mw, mh);
  var scX = mw / MAP_W, scY = mh / MAP_H;
  mmCtx.fillStyle = 'rgba(78,205,196,0.25)';
  mmCtx.beginPath(); mmCtx.arc(TOWN_X*scX, TOWN_Y*scY, 10, 0, Math.PI*2); mmCtx.fill();
  mmCtx.fillStyle = 'rgba(255,68,85,0.25)';
  mmCtx.beginPath(); mmCtx.arc(DUNGEON_X*scX, DUNGEON_Y*scY, 5, 0, Math.PI*2); mmCtx.fill();
  var mmArr = Object.values(allMonsters);
  for (var i = 0; i < mmArr.length; i++) {
    var mm = mmArr[i];
    var mmai = monsterAI[mm.uid];
    mmCtx.fillStyle = (mmai && mmai.state === 'chase') ? 'rgba(255,68,85,0.8)' : 'rgba(255,100,100,0.4)';
    mmCtx.fillRect(mm.x*scX - 1, mm.y*scY - 1, 2, 2);
  }
  var mpArr = Object.entries(allPlayers);
  for (var j = 0; j < mpArr.length; j++) {
    if (mpArr[j][0] === socket.id) continue;
    var pp = mpArr[j][1];
    mmCtx.fillStyle = pp.color + 'aa';
    mmCtx.fillRect(pp.x*scX - 2, pp.y*scY - 2, 4, 4);
  }
  if (me) { mmCtx.fillStyle = '#fff'; mmCtx.fillRect(me.x*scX - 2.5, me.y*scY - 2.5, 5, 5); }
  mmCtx.strokeStyle = 'rgba(0,200,240,0.3)'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(camX*scX, camY*scY, canvas.width*scX, canvas.height*scY);
}

// ══════════════════════════════════════
//  키보드
// ══════════════════════════════════════
window.addEventListener('keydown', function(e) {
  if (document.activeElement === document.getElementById('chat-input')) return;
  keysDown[e.key] = true;

  if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    if (!me || me.hp <= 0) return;
    var tgt = getAttackTarget();
    var now = Date.now();
    if (!tgt) { addSysMsg('[스킬] 범위 내 몬스터가 없습니다!'); return; }
    if (now - lastSkillTime < SKILL_COOLDOWN) return;
    var dist = Math.hypot(me.x - tgt.x, me.y - tgt.y);
    if (dist > ATTACK_RANGE) { addSysMsg('[스킬] 몬스터에게 더 가까이 가세요!'); return; }
    lastSkillTime = now;
    socket.emit('attack monster', { uid: tgt.uid, action: 'skill' });
  }

  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    socket.emit('heal');
  }

  if (e.key === 'Enter') {
    document.getElementById('chat-input').focus();
    e.preventDefault();
  }
});
window.addEventListener('keyup', function(e) { keysDown[e.key] = false; });

// ══════════════════════════════════════
//  소켓 이벤트
// ══════════════════════════════════════
socket.on('field state', function(data) {
  var monsters = data.monsters, players = data.players;
  allMonsters = {};
  for (var i = 0; i < monsters.length; i++) {
    var m = monsters[i];
    allMonsters[m.uid] = Object.assign({}, m, { alive: true });
    initMonsterAI(allMonsters[m.uid]);
  }
  var uids = Object.keys(monsterAI);
  for (var j = 0; j < uids.length; j++) {
    if (!allMonsters[uids[j]]) delete monsterAI[uids[j]];
  }
  allPlayers = {};
  for (var k = 0; k < players.length; k++) allPlayers[players[k].id] = players[k];
  updateOnlineCount();
});

socket.on('player joined', function(p) { allPlayers[p.id] = p; updateOnlineCount(); });
socket.on('player left',   function(id) { delete allPlayers[id]; updateOnlineCount(); });
socket.on('player moved',  function(data) {
  if (allPlayers[data.id]) { allPlayers[data.id].x = data.x; allPlayers[data.id].y = data.y; }
});
socket.on('player shape update', function(data) {
  if (allPlayers[data.id]) {
    allPlayers[data.id].shape = data.shape; allPlayers[data.id].color = data.color;
    if (data.level) allPlayers[data.id].level = data.level;
  }
  if (data.id === socket.id && me) {
    me.shape = data.shape; me.color = data.color;
    if (data.level) me.level = data.level;
    updateHUD();
  }
});

socket.on('monster positions', function(positions) {
  for (var i = 0; i < positions.length; i++) {
    var pos = positions[i];
    var m = allMonsters[pos.uid];
    if (!m) continue;
    var err = Math.hypot(pos.x - m.x, pos.y - m.y);
    if (err > 80) {
      m.x = pos.x; m.y = pos.y;
    } else {
      m.x += (pos.x - m.x) * 0.15;
      m.y += (pos.y - m.y) * 0.15;
    }
    m.hp = pos.hp;
    if (monsterAI[pos.uid]) monsterAI[pos.uid].state = pos.state;
  }
});

socket.on('monsters spawned', function(monsters) {
  for (var i = 0; i < monsters.length; i++) {
    var m = monsters[i];
    if (!allMonsters[m.uid]) {
      allMonsters[m.uid] = Object.assign({}, m, { alive: true });
      initMonsterAI(allMonsters[m.uid]);
    }
  }
});

socket.on('combat result', function(data) {
  if (allMonsters[data.monsterUid]) {
    allMonsters[data.monsterUid].hp = data.monsterHp;
    if (targetMonster  && targetMonster.uid  === data.monsterUid) targetMonster.hp  = data.monsterHp;
    if (nearestMonster && nearestMonster.uid === data.monsterUid) nearestMonster.hp = data.monsterHp;
  }
  if (data.attackerId === socket.id && me) {
    me.hp = data.playerHp; me.mp = data.playerMp; updateHUD();
    if (me.hp <= 0) document.getElementById('death-overlay').classList.add('show');
  }
  // 데미지 팝업: 몬스터 스크린 위치에 표시
  var m = allMonsters[data.monsterUid];
  if (m && isInViewport(m.x, m.y, 100)) {
    showDmgPopupAt(
      String(data.dmg),
      data.action === 'skill' ? '#8866ff' : '#ffcc44',
      m.x - camX, m.y - camY - 28
    );
  }
});

socket.on('monster killed', function(data) {
  var uid = data.uid, killerNickname = data.killerNickname, exp = data.exp, gold = data.gold;
  if (allMonsters[uid]) {
    allMonsters[uid].alive = false;
    setTimeout(function() { delete allMonsters[uid]; delete monsterAI[uid]; }, 300);
  }
  if (targetMonster  && targetMonster.uid  === uid) targetMonster  = null;
  if (nearestMonster && nearestMonster.uid === uid) nearestMonster = null;
  addSysMsg('[처치] ' + killerNickname + '이(가) 처치! +' + exp + 'EXP +' + gold + 'G');
  if (me && killerNickname === me.nickname) { me.exp += exp; me.gold += gold; me.kills++; updateHUD(); }
});

socket.on('healed', function(data) {
  if (me) { me.hp = data.hp; me.maxHp = data.maxHp; me.mp = data.mp; me.maxMp = data.maxMp; updateHUD(); }
  showDmgPopupAt('+' + data.amt, '#3dffaa', me.x - camX, me.y - camY - 30);
});

socket.on('mp regen', function(data) {
  if (!me) return;
  me.mp = data.mp; me.maxMp = data.maxMp; updateHUD();
});

socket.on('level up', function(data) {
  if (!me) return;
  me.level = data.level; me.exp   = data.exp;
  me.maxHp = data.maxHp; me.hp   = data.hp;
  me.maxMp = data.maxMp; me.mp   = data.mp;
  me.atk   = data.atk;   me.def  = data.def;
  me.shape = data.shape; me.color = data.color;
  updateHUD();
  showLevelUp(data.level, data.evolved ? data.evolvedName : null);
});

socket.on('revive', function(data) {
  if (!me) return;
  me.hp = data.hp; me.mp = data.mp;
  me.x  = data.x;  me.y  = data.y;
  me.gold = data.gold;
  updateHUD();
  document.getElementById('death-overlay').classList.remove('show');
  addSysMsg('[부활] 마을에서 되살아났습니다.');
});

socket.on('monster attack', function(data) {
  if (!me) return;
  me.hp = data.playerHp; me.maxHp = data.playerMaxHp; updateHUD();
  if (me.hp <= 0) document.getElementById('death-overlay').classList.add('show');
  showDmgPopupAt('-' + data.dmg, '#ff4455', me.x - camX, me.y - camY - 28);
  addSysMsg('[피격] ' + data.monsterName + '이(가) ' + data.dmg + ' 데미지!');
});

socket.on('system message', function(msg) { addSysMsg(msg); });

socket.on('chat message', function(data) {
  var msgs = document.getElementById('messages');
  var el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = '<span class="chat-nick" style="color:' + data.color + '">' + esc(data.nickname) + '</span>'
    + ' <span style="color:var(--dim)">' + data.time + '</span><br>' + esc(data.message);
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
});

socket.on('class unlock available', function(classes) { openClassModal(classes); });
socket.on('class chosen', function(data) {
  if (!me) return;
  Object.assign(me, data); updateHUD(); closeClassModal();
});

// ══════════════════════════════════════
//  HUD
// ══════════════════════════════════════
function updateOnlineCount() {
  onlineCount = Object.keys(allPlayers).length;
  document.getElementById('chat-online').textContent = '\u25CF ' + onlineCount + ' online';
}

var EVO_TABLE = [
  { level:1, name:'\uc6d0\ud615\uccb4' }, { level:5, name:'\uc0bc\uac01\uccb4' },
  { level:10,name:'\uc0ac\uac01\uccb4' }, { level:18,name:'\uc624\uac01\uccb4' },
  { level:28,name:'\uc721\uac01\uccb4' }, { level:40,name:'\uc131\ud615\uccb4' },
];
function getEvoName(level, cls) {
  if (cls) return cls;
  var n = EVO_TABLE[0].name;
  for (var i = 0; i < EVO_TABLE.length; i++) {
    if (level >= EVO_TABLE[i].level) n = EVO_TABLE[i].name; else break;
  }
  return n;
}
function expForLevel(lv) { return lv * 100 + (lv - 1) * 50; }

function updateHUD() {
  if (!me) return;
  var classLabel = me.className ? '[' + me.className + '] ' : '';
  document.getElementById('hud-name').textContent  = me.nickname;
  document.getElementById('hud-class').textContent = classLabel + 'Lv.' + me.level + ' \u00b7 ' + getEvoName(me.level, me.className);
  document.getElementById('hud-shape').innerHTML   = makeShapeSVG(me.shape, 28, me.color);
  var hpPct = me.maxHp > 0 ? (me.hp / me.maxHp * 100) : 0;
  var mpPct = me.maxMp > 0 ? (me.mp / me.maxMp * 100) : 0;
  document.getElementById('hud-hp-bar').style.width = hpPct + '%';
  document.getElementById('hud-hp-val').textContent = me.hp + '/' + me.maxHp;
  document.getElementById('hud-mp-bar').style.width = mpPct + '%';
  document.getElementById('hud-mp-val').textContent = me.mp + '/' + me.maxMp;
  document.getElementById('hud-atk').textContent   = me.atk;
  document.getElementById('hud-def').textContent   = me.def;
  document.getElementById('hud-kills').textContent = me.kills || 0;
  document.getElementById('hud-exp').textContent   = me.exp + '/' + expForLevel(me.level);
  document.getElementById('hud-gold').textContent  = me.gold + ' G';
}

// ══════════════════════════════════════
//  모달 / 팝업
// ══════════════════════════════════════
function openClassModal(classes) {
  var grid = document.getElementById('cm-grid');
  grid.innerHTML = '';
  for (var i = 0; i < classes.length; i++) {
    var cls = classes[i];
    var el = document.createElement('div');
    el.className = 'cm-card';
    el.style.borderColor = cls.color + '55';
    el.innerHTML = '<div class="cm-shape">' + makeShapeSVG(cls.shape, 44, cls.color) + '</div>'
      + '<div class="cm-name" style="color:' + cls.color + '">' + cls.name + '</div>'
      + '<div class="cm-cond">' + cls.condition + '</div>';
    (function(id) { el.onclick = function() { socket.emit('choose class', id); }; })(cls.id);
    grid.appendChild(el);
  }
  document.getElementById('class-modal').classList.add('show');
}
function closeClassModal() { document.getElementById('class-modal').classList.remove('show'); }

function showLevelUp(level, evolvedName) {
  var pop = document.getElementById('levelup-pop');
  document.getElementById('lup-n').textContent   = level;
  document.getElementById('lup-evo').textContent = evolvedName ? evolvedName + '\uc73c\ub85c \uc9c4\ud654' : '';
  pop.classList.add('show');
  setTimeout(function() { pop.classList.remove('show'); }, 2500);
}

// ══════════════════════════════════════
//  데미지 팝업
// ══════════════════════════════════════
function showDmgPopupAt(val, color, screenX, screenY) {
  var el = document.createElement('div');
  el.className = 'dmg-float';
  var rect = canvas.getBoundingClientRect();
  var absX = rect.left + screenX + (Math.random() - 0.5) * 24;
  var absY = rect.top  + screenY;
  el.style.cssText = 'left:' + absX + 'px;top:' + absY + 'px;color:' + color
    + ';text-shadow:0 0 8px ' + color + ';';
  el.textContent = val;
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1000);
}

// ══════════════════════════════════════
//  채팅
// ══════════════════════════════════════
function sendChat() {
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat message', { message: msg });
  input.value = '';
}
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  e.stopPropagation();
  if (e.key === 'Enter') sendChat();
});
document.getElementById('chat-input').addEventListener('keyup', function(e) { e.stopPropagation(); });

function addSysMsg(msg) {
  var msgs = document.getElementById('messages');
  var el = document.createElement('div');
  el.className = 'chat-sys';
  el.textContent = msg;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  while (msgs.children.length > 120) msgs.removeChild(msgs.firstChild);
}

// ══════════════════════════════════════
//  SVG 도형 헬퍼
// ══════════════════════════════════════
function makeShapeSVG(shape, size, color) {
  var c = color, s = size;
  var half = s / 2, r = half - 2;
  switch (shape) {
    case 'circle':
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<circle cx="' + half + '" cy="' + half + '" r="' + r + '" fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    case 'triangle':
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<polygon points="' + half + ',2 ' + (s-2) + ',' + (s-2) + ' 2,' + (s-2) + '"'
        + ' fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    case 'square':
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<rect x="2" y="2" width="' + (s-4) + '" height="' + (s-4) + '"'
        + ' fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    case 'pentagon': {
      var pts5 = '';
      for (var i = 0; i < 5; i++) {
        var a5 = (i * 72 - 90) * Math.PI / 180;
        pts5 += (half + r * Math.cos(a5)) + ',' + (half + r * Math.sin(a5)) + ' ';
      }
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<polygon points="' + pts5.trim() + '" fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    }
    case 'hexagon': {
      var pts6 = '';
      for (var i = 0; i < 6; i++) {
        var a6 = (i * 60 - 30) * Math.PI / 180;
        pts6 += (half + r * Math.cos(a6)) + ',' + (half + r * Math.sin(a6)) + ' ';
      }
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<polygon points="' + pts6.trim() + '" fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    }
    case 'star': {
      var ro = r, ri = s / 4, pts10 = '';
      for (var i = 0; i < 10; i++) {
        var sr = i % 2 === 0 ? ro : ri;
        var sa = (i * 36 - 90) * Math.PI / 180;
        pts10 += (half + sr * Math.cos(sa)) + ',' + (half + sr * Math.sin(sa)) + ' ';
      }
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">'
        + '<polygon points="' + pts10.trim() + '" fill="' + c + '22" stroke="' + c + '" stroke-width="1.5"/></svg>';
    }
    default:
      return makeShapeSVG('circle', size, color);
  }
}

function esc(t) {
  return String(t)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
